---

- name: Assert that all required inputs have been provided.
  ansible.builtin.assert:
    that:
      - tesseract_email_host is not none
      - tesseract_email_port is not none
      - tesseract_email_username is not none
      - tesseract_email_password is not none

- name: Install msmtp, git, cron and rsync.
  ansible.builtin.package:
    name:
      - msmtp
      - git
      - cron
      - rsync
    update_cache: true

- name: Add msmtp email global config.
  no_log: true
  ansible.builtin.blockinfile:
    path: /etc/msmtprc
    create: true
    owner: root
    group: root
    mode: '0644'
    block: |
      account default
      tls on
      tls_starttls off
      tls_certcheck off
      auth login
      host "{{ tesseract_email_host }}"
      port "{{ tesseract_email_port }}"
      user "{{ tesseract_email_username }}"
      from "{{ tesseract_email_username }}"
      password "{{ tesseract_email_password }}"

- name: Create backup destination directory if it does not exist
  ansible.builtin.file:
    path: "{{ mirror_backup_destination }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create scripts directory if it does not exist.
  ansible.builtin.file:
    path: "{{ mirror_backup_scripts_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Git checkout scripts to scripts directory.
  ansible.builtin.git:
    repo: "{{ mirror_backup_scripts_repo }}"
    dest: "{{ mirror_backup_scripts_path }}"
    version: main
    force: true
  register: download_scripts
  retries: 5
  delay: 10
  until: download_scripts is succeeded

- name: Write .env file.
  ansible.builtin.blockinfile:
    path: "{{ mirror_backup_scripts_path }}/.env"
    marker: "# {mark} mirror_backup ANSIBLE MANAGED BLOCK"
    create: true
    owner: root
    group: root
    mode: '0644'
    block: |
      MIRROR_BACKUP_DESTINATION="{{ mirror_backup_destination }}"
      LOG_FILE="{{ mirror_backup_log_file }}"
      EMAIL_USERNAME="{{ tesseract_email_username }}"

- name: Add cron job for mirror backup script.
  ansible.builtin.cron:
    name: "Mirror backup for {{ item.path | basename }}."
    minute: "{{ mirror_backup_minute }}"
    hour: "{{ mirror_backup_hour }}"
    day: "{{ mirror_backup_day }}"
    job: >
      bash {{ mirror_backup_scripts_path }}/mirror_backup.sh {{ item.path }}
      {{ '-d' if not item.stop_docker | default(false) }}
  when: mirror_backup_paths | length > 0
  loop: "{{ mirror_backup_paths }}"
