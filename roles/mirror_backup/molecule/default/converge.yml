---
- name: Converge
  hosts: all
  vars:
    tesseract_email_username: "email@email.com"
    tesseract_email_host: "email.com"
    tesseract_email_port: "465"
    tesseract_email_password: "password"
    mirror_backup_paths:
      - path: /tmp/data
        stop_docker: false
  roles:
    - role: tesseract.system.mirror_backup
