---

mirror_backup_log_file: /var/log/tesseract.log
mirror_backup_scripts_path: /opt/tesseract/scripts

mirror_backup_scripts_repo: https://github.com/ben16w/tesseract-scripts.git

mirror_backup_paths: []
# Example:
# mirror_backup_paths:
#   - path: /media/appdata
#     stop_docker: true
#   - path: /media/local

mirror_backup_destination: /media/backups

mirror_backup_minute: 0
mirror_backup_hour: 0
mirror_backup_day: "*"

tesseract_email_host: ~
tesseract_email_port: ~
tesseract_email_username: ~
tesseract_email_password: ~
