---

tesseract_files_path: "/root"

tesseract_log_file: "/var/log/tesseract.log"

monitor_enabled: true
monitor_poll_interval: 15 # Polling interval in minutes
monitor_email_to: ~
monitor_cursor_file: "/var/lib/monitor/cursor"
monitor_exclude_patterns: []
  # Regex patterns (extended regex) matched against journal error lines.
  # Any line matching a pattern is excluded before the email is sent.
  # If all errors are excluded, no email is sent.
  # Examples:
  # - "audit"                    # drop all audit subsystem noise
  # - "kernel: usb"              # drop USB hotplug errors
  # - "ACPI: .*not found"        # drop ACPI table warnings (wildcard)
  # - "(wpa_supplicant|dhclient)" # drop multiple sources in one pattern

email_host: ~
email_port: ~
email_username: ~
email_password: ~
