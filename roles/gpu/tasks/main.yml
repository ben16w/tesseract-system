---

- name: Check if the distribution is Ubuntu.
  ansible.builtin.assert:
    that:
      - ansible_distribution == 'Ubuntu'

- name: Ensure render and video groups exist.
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
    system: true
  loop:
    - render
    - video

- name: Add the tesseract user to the render and video groups.
  ansible.builtin.user:
    name: "{{ tesseract_username }}"
    groups:
      - render
      - video
    append: true

- name: Install AMD ROCm support.
  ansible.builtin.include_tasks:
    file: install_amd.yml
  when: gpu_install_amd is true

- name: Install Vulkan support.
  ansible.builtin.include_tasks:
    file: install_vulkan.yml
  when: gpu_install_vulkan is true
