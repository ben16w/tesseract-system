---

local_backup_log_file: /var/log/tesseract.log

local_backup_scripts_repo: https://github.com/ben16w/tesseract-common.git
local_backup_scripts_version: main
local_backup_scripts_path: /opt/common
local_backup_scripts_subdir: scripts

local_backup_paths: []

local_backup_destination: /media/backups

local_backup_keep_daily: 4
local_backup_keep_weekly: 3
local_backup_keep_monthly: 2

local_backup_minute: 0
local_backup_hour: 0
local_backup_day: "*"

tesseract_email_host: ~
tesseract_email_port: ~
tesseract_email_username: ~
tesseract_email_password: ~
