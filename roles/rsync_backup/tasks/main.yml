---

- name: Assert that all required inputs have been provided.
  ansible.builtin.assert:
    that:
      - tesseract_email_host is not none
      - tesseract_email_port is not none
      - tesseract_email_username is not none
      - tesseract_email_password is not none

- name: Install msmtp, git, cron and rsync.
  ansible.builtin.package:
    name:
      - msmtp
      - git
      - cron
      - rsync
    update_cache: true

- name: Add msmtp email global config.
  no_log: true
  ansible.builtin.blockinfile:
    path: /etc/msmtprc
    create: true
    owner: root
    group: root
    mode: '0644'
    block: |
      account default
      tls on
      tls_starttls off
      tls_certcheck off
      auth login
      host "{{ tesseract_email_host }}"
      port "{{ tesseract_email_port }}"
      user "{{ tesseract_email_username }}"
      from "{{ tesseract_email_username }}"
      password "{{ tesseract_email_password }}"

- name: Create backup destination directory if it does not exist
  ansible.builtin.file:
    path: "{{ rsync_backup_destination }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Git checkout common repo.
  ansible.builtin.git:
    repo: "{{ rsync_backup_scripts_repo }}"
    dest: "{{ rsync_backup_scripts_path }}"
    version: "{{ rsync_backup_scripts_version }}"
    force: true
  register: download_common
  retries: 5
  delay: 10
  until: download_common is succeeded

- name: Write .env file.
  ansible.builtin.blockinfile:
    path: "{{ rsync_backup_scripts_path }}/{{ rsync_backup_scripts_subdir }}/.env"
    marker: "# {mark} rsync_backup ANSIBLE MANAGED BLOCK"
    create: true
    owner: root
    group: root
    mode: '0644'
    block: |
      RSYNC_BACKUP_DESTINATION="{{ rsync_backup_destination }}"
      RSYNC_BACKUP_MAX_BACKUPS="{{ rsync_backup_max_backups }}"
      LOG_FILE="{{ rsync_backup_log_file }}"
      EMAIL_USERNAME="{{ tesseract_email_username }}"

- name: Initialize an empty string for rsync backup paths.
  ansible.builtin.set_fact:
    backup_directories_string: ""
  when: rsync_backup_paths | length > 0

- name: Generate string of rsync backup paths.
  ansible.builtin.set_fact:
    backup_directories_string: "{{ backup_directories_string }} {{ item }}"
  loop: "{{ rsync_backup_paths }}"
  when: rsync_backup_paths | length > 0

- name: Add cron job for rsync backup script.
  ansible.builtin.cron:
    name: "Rsync backup."
    minute: "{{ rsync_backup_minute }}"
    hour: "{{ rsync_backup_hour }}"
    day: "{{ rsync_backup_day }}"
    job: "bash {{ rsync_backup_scripts_path }}/{{ rsync_backup_scripts_subdir }}/rsync_backup.sh{{ backup_directories_string }}"
  when: rsync_backup_paths | length > 0
